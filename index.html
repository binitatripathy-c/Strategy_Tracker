// ── Helpers ───────────────────────────────────────────────────────────────────
function fmtDate(d=new Date()){
  return d.getDate()+"-"+["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][d.getMonth()]+"-"+String(d.getFullYear()).slice(2);
}
function toISO(d){if(!d)return"";var pts=d.split("-");var months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];var mo=months.indexOf(pts[1]);var mm=String(mo+1).padStart(2,"0");var dd=String(pts[0]).padStart(2,"0");return"20"+pts[2]+"-"+mm+"-"+dd;}
function fromISO(s){if(!s)return"";const d=new Date(s+"T00:00:00");return fmtDate(d);}
function daysBetween(a,b){const ms=new Date(b)-new Date(a);return Math.round(ms/86400000);}
function addDays(iso,n){const d=new Date(iso+"T00:00:00");d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);}
function today(){return new Date().toISOString().slice(0,10);}

function gradeColor(g){
  if(g===5)return{bg:"#C0DD97",fg:"#27500A"};
  if(g>=3) return{bg:"#EAF3DE",fg:"#3B6D11"};
  if(g>=1) return{bg:"#FAEEDA",fg:"#854F0B"};
  return{bg:"#FCEBEB",fg:"#A32D2D"};
}
function statusColor(s){
  if(s==="On Time") return{bg:"#EAF3DE",fg:"#3B6D11"};
  if(s==="At Risk")  return{bg:"#FFF3CD",fg:"#856404"};
  if(s==="Overdue")  return{bg:"#FCEBEB",fg:"#A32D2D"};
  if(s==="Done")     return{bg:"#C0DD97",fg:"#27500A"};
  return{bg:"#F1EFE8",fg:"#5F5E5A"};
}

function calcProjectStatus(proj){
  const t=today();
  if(!proj.startDate||!proj.endDate)return"No dates";
  const allDone=proj.stages.every(s=>s.grade===5);
  if(allDone)return"Done";
  if(t>proj.endDate)return"Overdue";
  const total=daysBetween(proj.startDate,proj.endDate);
  const elapsed=daysBetween(proj.startDate,t);
  const avgGrade=proj.stages.reduce((a,s)=>a+s.grade,0)/proj.stages.length;
  const expectedPct=(elapsed/total)*100;
  const actualPct=(avgGrade/5)*100;
  if(actualPct>=expectedPct-15)return"On Time";
  return"At Risk";
}

// ── Mini components ───────────────────────────────────────────────────────────
function Badge({label,bg,fg,size=11}){
  return E('span',{style:{background:bg,color:fg,padding:"3px 9px",borderRadius:20,fontSize:size,fontWeight:600,whiteSpace:"nowrap",display:"inline-block"}},label);
}
function WFBadge({wf}){
  const w=WORKFLOWS[wf];
  return w?E(Badge,{label:wf,bg:w.light,fg:w.color}):null;
}
function GradePill({grade}){
  const{bg,fg}=gradeColor(grade);
  return E('span',{style:{display:"inline-flex",alignItems:"center",justifyContent:"center",width:26,height:26,borderRadius:"50%",background:bg,color:fg,fontWeight:700,fontSize:12}},grade);
}
function Av({name,people}){
  const list=people||DEF_PEOPLE;
  const ini=name.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
  const cs=["#E6F1FB","#EAF3DE","#FAEEDA","#FCEBEB","#EEEDFE","#F1EFE8","#E1F5EE","#FBEAF0","#FEF0E0","#F0F8FF"];
  const fs=["#0C447C","#27500A","#633806","#791F1F","#3C3489","#444441","#085041","#72243E","#7A4A00","#1A3A5C"];
  const i=Math.max(0,list.indexOf(name))%cs.length;
  return E('div',{style:{width:30,height:30,borderRadius:"50%",background:cs[i],color:fs[i],display:"flex",alignItems:"center",justifyContent:"center",fontWeight:600,fontSize:11,flexShrink:0,title:name}},ini);
}
function Bar({value,max=5,color}){
  const pct=Math.round((value/max)*100);

}

// ── New Project Modal ─────────────────────────────────────────────────────────
function NewProjectModal({people,onSave,onClose}){
  const [name,setName]=useState("");
  const [wf,setWf]=useState("");
  const [owner,setOwner]=useState("");
  const [startD,setStartD]=useState(today());
  const [endD,setEndD]=useState("");
  const [stageDates,setStageDates]=useState([]);
  const [step,setStep]=useState(1); // 1=basic info, 2=stage dates

  function autoFill(){
    if(!wf||!startD||!endD)return;
    const stages=WORKFLOWS[wf].stages;
    const total=daysBetween(startD,endD);
    const perStage=Math.max(1,Math.floor(total/stages.length));
    const dates=stages.map((_,i)=>({
      stage:stages[i],
      deadline:addDays(startD,perStage*(i+1))
    }));
    // clamp last to endD
    if(dates.length)dates[dates.length-1].deadline=endD;
    setStageDates(dates);
    setStep(2);
  }

  function updateDeadline(i,val){
    setStageDates(sd=>sd.map((s,idx)=>idx===i?{...s,deadline:val}:s));
  }

  function save(){
    if(!name||!wf||!startD||!endD)return;
    const stages=stageDates.length?stageDates:WORKFLOWS[wf].stages.map((s,i)=>({stage:s,deadline:endD,grade:0}));
    onSave({
      id:"p"+Date.now(),
      name,wf,owner,startDate:startD,endDate:endD,
      stages:stages.map(s=>({...s,grade:0})),
      createdAt:today()
    });
  }

  const canNext=name&&wf&&owner&&startD&&endD&&new Date(endD)>new Date(startD);

  return E('div',{className:"modal-overlay",onClick:e=>{if(e.target.className==="modal-overlay")onClose();}},
    E('div',{className:"modal"},
      E('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}},
        E('div',{style:{fontSize:15,fontWeight:600,color:"#1B2A4A"}},step===1?"New Project":"Set Stage Deadlines"),
        E('button',{onClick:onClose,style:{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"#8A94A6"}},"×")
      ),

      step===1&&E(React.Fragment,null,
        E('div',{style:{display:"grid",gap:14}},
          E('div',null,E(SLabel,null,"Project name"),E('input',{value:name,onChange:e=>setName(e.target.value),placeholder:"e.g. Hasti Q3 Strategy",style:{width:"100%",height:38,borderRadius:8,border:"1px solid #E2E5EF",padding:"0 12px",fontSize:13,background:"#F5F6FA",outline:"none",color:"#1A1A2E"}})),
          E('div',null,E(SLabel,null,"Workflow type"),E(Sel,{value:wf,onChange:setWf,options:WF_NAMES,placeholder:"Select workflow..."})),
          E('div',null,E(SLabel,null,"Owner / Lead"),E(Sel,{value:owner,onChange:setOwner,options:people,placeholder:"Assign lead..."})),
          E('div',{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}},
            E('div',null,E(SLabel,null,"Start date"),E('input',{type:"date",value:startD,onChange:e=>setStartD(e.target.value)})),
            E('div',null,E(SLabel,null,"End date"),E('input',{type:"date",value:endD,onChange:e=>setEndD(e.target.value)}))
          ),
          endD&&startD&&new Date(endD)<=new Date(startD)&&E('div',{style:{fontSize:12,color:"#A32D2D",background:"#FCEBEB",padding:"8px 12px",borderRadius:8}},"End date must be after start date"),
          E('button',{onClick:autoFill,disabled:!canNext,style:{height:40,borderRadius:8,border:"none",background:canNext?"#1B2A4A":"#D3D1C7",color:"#fff",fontSize:13,fontWeight:600,cursor:canNext?"pointer":"not-allowed",width:"100%"}},"Next — Set stage deadlines →")
        )
      ),

      step===2&&E(React.Fragment,null,
        E('div',{style:{fontSize:12,color:"#8A94A6",marginBottom:14,background:"#F5F6FA",padding:"10px 12px",borderRadius:8}},
          "Auto-divided from "+fromISO(startD)+" to "+fromISO(endD)+". Edit any deadline below."
        ),
        E('div',{style:{display:"grid",gap:8,maxHeight:340,overflowY:"auto"}},
          ...stageDates.map((sd,i)=>
            E('div',{key:i,style:{display:"flex",alignItems:"center",gap:10,padding:"8px 10px",background:i%2===0?"#F9FAFB":"#fff",borderRadius:8,border:"0.5px solid #E2E5EF"}},
              E('div',{style:{width:22,height:22,borderRadius:"50%",background:WORKFLOWS[wf].color,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,flexShrink:0}},i+1),
              E('div',{style:{flex:1,fontSize:12,color:"#1A1A2E"}},sd.stage),
              E('input',{type:"date",value:sd.deadline,onChange:e=>updateDeadline(i,e.target.value),style:{width:140,height:32,borderRadius:6,border:"1px solid #E2E5EF",padding:"0 8px",fontSize:12,background:"#fff",outline:"none",color:"#1A1A2E",flexShrink:0}})
            )
          )
        ),
        E('div',{style:{display:"flex",gap:10,marginTop:16}},
          E('button',{onClick:()=>setStep(1),style:{height:40,borderRadius:8,border:"0.5px solid #E2E5EF",background:"#F5F6FA",color:"#8A94A6",fontSize:13,fontWeight:600,cursor:"pointer",flex:1}},"← Back"),
          E('button',{onClick:save,style:{height:40,borderRadius:8,border:"none",background:"#1B2A4A",color:"#fff",fontSize:13,fontWeight:600,cursor:"pointer",flex:2}},"Create project")
        )
      )
    )
  );
}

// ── Log Modal ─────────────────────────────────────────────────────────────────
function LogModal({people,projects,editEntry,onSave,onClose}){
  const [personName,setPersonName]=useState(editEntry && editEntry.name||"");
  const [projId,setProjId]=useState(editEntry && editEntry.projectId||"");
  const [stage,setStage]=useState(editEntry && editEntry.stage||"");
  const [grade,setGrade]=useState(editEntry != null && editEntry.grade != null ? editEntry.grade : null);
  const [notes,setNotes]=useState(editEntry && editEntry.notes||"");

  const selProj=projects.find(p=>p.id===projId);
  const stageOpts=selProj?selProj.stages.map(s=>s.stage):[];

  function save(){
    if(!personName||!projId||!stage||grade===null)return;
    onSave({
      id:editEntry && editEntry.id||"l"+Date.now(),
      date:editEntry && editEntry.date||fmtDate(),
      name:personName,projectId:projId,
      projectName:selProj && selProj.name||"",
      wf:selProj && selProj.wf||"",
      stage,grade,notes
    });
  }

  const ready=personName&&projId&&stage&&grade!==null;

  return E('div',{className:"modal-overlay",onClick:e=>{if(e.target.className==="modal-overlay")onClose();}},
    E('div',{className:"modal"},
      E('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}},
        E('div',{style:{fontSize:15,fontWeight:600,color:"#1B2A4A"}},editEntry?"Edit Entry":"Today's Log"),
        E('button',{onClick:onClose,style:{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"#8A94A6"}},"×")
      ),
      E('div',{style:{display:"grid",gap:14}},
        E('div',null,E(SLabel,null,"Your name"),E(Sel,{value:personName,onChange:setPersonName,options:people,placeholder:"Select..."})),
        E('div',null,E(SLabel,null,"Project"),
          E(Sel,{value:projId,onChange:v=>{setProjId(v);setStage("");},options:projects.map(p=>p.id),placeholder:"Select project...",style:{}}),
          projId&&E('div',{style:{marginTop:4}},
            projects.filter(p=>p.id===projId).map(p=>E(WFBadge,{key:p.id,wf:p.wf}))
          )
        ),
        projId&&E('div',null,E(SLabel,null,"Stage"),
          E(Sel,{value:stage,onChange:setStage,options:stageOpts,placeholder:"Select stage..."})
        ),
        E('div',null,
          E(SLabel,null,"Grade (0–5)"),
          E('div',{style:{display:"flex",gap:8}},
            ...[0,1,2,3,4,5].map(g=>{
              const sel=grade===g;const{bg,fg}=gradeColor(g);
              return E('button',{key:g,onClick:()=>setGrade(g),style:{width:42,height:42,borderRadius:8,border:sel?"2px solid "+fg:"1.5px solid #E2E5EF",background:sel?bg:"#F5F6FA",color:sel?fg:"#8A94A6",fontWeight:700,fontSize:14,cursor:"pointer",flexShrink:0}},g);
            })
          ),
          E('div',{style:{display:"flex",gap:5,marginTop:7,flexWrap:"wrap"}},
            ...["0=Not started","1=20%","2=40%","3=60%","4=80%","5=Done"].map(s=>
              E('span',{key:s,style:{fontSize:10,color:"#8A94A6",background:"#F5F6FA",borderRadius:4,padding:"2px 6px"}},s.replace("="," = "))
            )
          )
        ),
        E('div',null,
          E(SLabel,null,"Notes (optional)"),
          E('textarea',{value:notes,onChange:e=>setNotes(e.target.value),placeholder:"Any blockers, comments...",style:{width:"100%",height:70,borderRadius:8,border:"1px solid #E2E5EF",padding:"10px 12px",fontSize:13,background:"#F5F6FA",outline:"none",color:"#1A1A2E",resize:"vertical"}})
        ),
        E('button',{onClick:save,disabled:!ready,style:{height:42,borderRadius:8,border:"none",background:ready?"#1B2A4A":"#D3D1C7",color:"#fff",fontSize:13,fontWeight:600,cursor:ready?"pointer":"not-allowed"}},editEntry?"Save changes":"Log it")
      )
    )
  );
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App(){
  const [tab,setTab]=useState("log");
  const [logs,setLogs]=useState(()=>lsGet("trk_logs")||[]);
  const [projects,setProjects]=useState(()=>lsGet("trk_projects")||[]);
  const [people,setPeople]=useState(()=>lsGet("trk_people")||DEF_PEOPLE);
  const [showNewProj,setShowNewProj]=useState(false);
  const [showLog,setShowLog]=useState(false);
  const [editLog,setEditLog]=useState(null);
  const [saved,setSaved]=useState(false);
  const [filterPerson,setFP]=useState("All");
  const [filterWF,setFWF]=useState("All");
  const [filterProj,setFPR]=useState("All");
  const [newPerson,setNewPerson]=useState("");
  const [analysisTxt,setAnalysisTxt]=useState("");
  const [analysing,setAnalysing]=useState(false);

  function persist(l,p,pe){
    lsSet("trk_logs",l||logs);
    lsSet("trk_projects",p||projects);
    lsSet("trk_people",pe||people);
    setSaved(true);setTimeout(()=>setSaved(false),1500);
  }

  function addProject(proj){
    const next=[...projects,proj];setProjects(next);persist(null,next,null);setShowNewProj(false);
  }

  function addLog(entry){
    // update project stage grade
    const updProjs=projects.map(p=>{
      if(p.id!==entry.projectId)return p;
      return{...p,stages:p.stages.map(s=>s.stage===entry.stage?{...s,grade:entry.grade}:s)};
    });
    let nextLogs;
    if(editLog){
      nextLogs=logs.map(l=>l.id===entry.id?entry:l);
    } else {
      nextLogs=[entry,...logs];
    }
    setLogs(nextLogs);setProjects(updProjs);
    persist(nextLogs,updProjs,null);
    setShowLog(false);setEditLog(null);
  }

  function deleteLog(id){
    if(!window.confirm("Delete this entry?"))return;
    const next=logs.filter(l=>l.id!==id);setLogs(next);persist(next,null,null);
  }

  function addPerson(){
    const t=newPerson.trim();if(!t||people.includes(t))return;
    const next=[...people,t];setPeople(next);persist(null,null,next);setNewPerson("");
  }
  function removePerson(p){
    const next=people.filter(x=>x!==p);setPeople(next);persist(null,null,next);
  }

  // filtered logs
  const fLogs=logs.filter(l=>{
    if(filterPerson!=="All"&&l.name!==filterPerson)return false;
    if(filterWF!=="All"&&l.wf!==filterWF)return false;
    if(filterProj!=="All"&&l.projectId!==filterProj)return false;
    return true;
  });

  // people stats
  const peopleStats=useMemo(()=>people.map(p=>{
    const pl=logs.filter(l=>l.name===p);
    const byWF={};
    WF_NAMES.forEach(w=>{
      const wl=pl.filter(l=>l.wf===w);
      if(wl.length)byWF[w]={count:wl.length,avg:wl.reduce((a,l)=>a+l.grade,0)/wl.length};
    });
    const activeProjs=[...new Set(pl.map(l=>l.projectId))];
    const total=pl.length,done=pl.filter(l=>l.grade===5).length,inProg=pl.filter(l=>l.grade>0&&l.grade<5).length;
    const avg=total?pl.reduce((a,l)=>a+l.grade,0)/total:null;
    return{name:p,total,done,inProg,avg,byWF,activeProjs,activeCount:activeProjs.length};
  }),[logs,people]);

  // project stats
  const projStats=useMemo(()=>projects.map(p=>{
    const pl=logs.filter(l=>l.projectId===p.id);
    const status=calcProjectStatus(p);
    const avgGrade=p.stages.reduce((a,s)=>a+s.grade,0)/p.stages.length;
    const doneStages=p.stages.filter(s=>s.grade===5).length;
    const stageAnalysis=p.stages.map(s=>{
      const sl=pl.filter(l=>l.stage===s.stage);
      const isOverdue=s.deadline&&today()>s.deadline&&s.grade<5;
      const daysLeft=s.deadline?daysBetween(today(),s.deadline):null;
      return{...s,logCount:sl.length,isOverdue,daysLeft};
    });
    return{...p,pl,status,avgGrade,doneStages,stageAnalysis};
  }),[projects,logs]);

  // AI analysis
  async function runAnalysis(){
    setAnalysing(true);setAnalysisTxt("");
    const summary=peopleStats.map(function(p){return p.name+": "+p.total+" logs, avg grade "+(p.avg!=null?p.avg.toFixed(1):"n/a")+", active projects: "+p.activeCount+", done stages: "+p.done+", in progress: "+p.inProg+". Workflows: "+Object.entries(p.byWF).map(function(e){return e[0]+"(avg "+e[1].avg.toFixed(1)+")"}).join(", ");}).join("\n");
    const projSummary=projStats.map(function(p){return p.name+" ["+p.wf+"]: status="+p.status+", avg grade="+p.avgGrade.toFixed(1)+", stages done="+p.doneStages+"/"+p.stages.length;}).join("\n");
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",
          max_tokens:1000,
          messages:[{role:"user",content:"You are a team performance analyst. Based on this data, give a concise written analysis (3-4 paragraphs) covering: (1) who is overloaded vs has bandwidth, (2) work speed patterns by activity type, (3) project health and where time is being lost, (4) recommendations.

People data:
"+summary+"

Project data:
"+projSummary}]
        })
      });
      const d=await res.json();
      setAnalysisTxt(d.content && d.content[0] && d.content[0].text||"No analysis returned.");
    }catch(e){setAnalysisTxt("Could not load analysis. Please try again.");}
    setAnalysing(false);
  }

  const TABS=[["log","Log"],["projects","Projects"],["people","People"],["settings","Settings"]];

  return E('div',{style:{fontFamily:"'DM Sans',system-ui,sans-serif",color:"#1A1A2E",minHeight:"100vh",background:"#F4F5F9"}},

    // topbar
    E('div',{style:{background:"#1B2A4A",padding:"0 20px",display:"flex",alignItems:"center",height:52,gap:10,position:"sticky",top:0,zIndex:100}},
      E('div',{style:{width:8,height:8,borderRadius:"50%",background:"#C0DD97",flexShrink:0}}),
      E('span',{style:{fontSize:15,fontWeight:600,color:"#fff"}},saved?"Saved ✓":"Team Tracker"),
      E('div',{style:{marginLeft:"auto",display:"flex",gap:8}},
        E('button',{onClick:()=>{setShowNewProj(true);},style:{height:32,padding:"0 14px",borderRadius:8,border:"none",background:"#2E4A7A",color:"#fff",fontSize:12,fontWeight:600,cursor:"pointer"}},"+ New project"),
        E('button',{onClick:()=>{setShowLog(true);setEditLog(null);},style:{height:32,padding:"0 14px",borderRadius:8,border:"none",background:"#C0DD97",color:"#27500A",fontSize:12,fontWeight:600,cursor:"pointer"}},"+ Log today")
      )
    ),

    // tabs
    E('div',{style:{background:"#fff",borderBottom:"0.5px solid #E2E5EF",display:"flex",padding:"0 16px",overflowX:"auto"}},
      ...TABS.map(([t,l])=>E('button',{key:t,onClick:()=>setTab(t),style:{padding:"11px 16px",fontSize:13,fontWeight:500,cursor:"pointer",background:"none",border:"none",borderBottom:tab===t?"2px solid #0B6E6E":"2px solid transparent",color:tab===t?"#0B6E6E":"#8A94A6",whiteSpace:"nowrap"}},l))
    ),

    E('div',{style:{maxWidth:900,margin:"0 auto",padding:"20px 16px"}},

      // stats strip
      E('div',{style:{display:"grid",gridTemplateColumns:"repeat(4,minmax(0,1fr))",gap:10,marginBottom:18}},
        ...[["Total logs",logs.length],["Projects",projects.length],["People",people.length],["Stages done",logs.filter(l=>l.grade===5).length]].map(([l,v])=>
          E('div',{key:l,style:{background:"#fff",borderRadius:10,border:"0.5px solid #E2E5EF",padding:"11px 14px"}},
            E('div',{style:{fontSize:10,fontWeight:600,color:"#8A94A6",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:3}},l),
            E('div',{style:{fontSize:20,fontWeight:600,color:"#1B2A4A"}},v)
          )
        )
      ),

      // ── LOG TAB ──────────────────────────────────────────────────────────────
      tab==="log"&&E(Card,null,
        E('div',{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14,flexWrap:"wrap",gap:8}},
          E('div',{style:{fontSize:13,fontWeight:600,color:"#1B2A4A"}},"Activity log"),
          E('div',{style:{display:"flex",gap:8,flexWrap:"wrap"}},
            E('select',{value:filterPerson,onChange:e=>setFP(e.target.value),style:{height:30,borderRadius:6,border:"0.5px solid #E2E5EF",padding:"0 8px",fontSize:12,background:"#F5F6FA",outline:"none",color:"#1A1A2E"}},
              E('option',null,"All people"),...people.map(p=>E('option',{key:p},p))
            ),
            E('select',{value:filterWF,onChange:e=>setFWF(e.target.value),style:{height:30,borderRadius:6,border:"0.5px solid #E2E5EF",padding:"0 8px",fontSize:12,background:"#F5F6FA",outline:"none",color:"#1A1A2E"}},
              E('option',{value:"All"},"All workflows"),...WF_NAMES.map(w=>E('option',{key:w},w))
            ),
            E('select',{value:filterProj,onChange:e=>setFPR(e.target.value),style:{height:30,borderRadius:6,border:"0.5px solid #E2E5EF",padding:"0 8px",fontSize:12,background:"#F5F6FA",outline:"none",color:"#1A1A2E"}},
              E('option',{value:"All"},"All projects"),...projects.map(p=>E('option',{key:p.id,value:p.id},p.name))
            )
          )
        ),
        fLogs.length===0
          ?E('div',{style:{textAlign:"center",padding:40,color:"#8A94A6",fontSize:13}},'No entries yet. Hit "+ Log today" to start.')
          :E('div',{style:{overflowX:"auto"}},
            E('table',{style:{width:"100%",borderCollapse:"collapse",fontSize:12,minWidth:600}},
              E('thead',null,E('tr',{style:{background:"#1B2A4A"}},
                ...["Date","Person","Project","Workflow","Stage","Grade","Notes","",""].map((h,i)=>
                  E('th',{key:i,style:{padding:"8px 10px",textAlign:h==="Grade"?"center":"left",color:"#fff",fontWeight:600,fontSize:11,width:[70,85,100,100,150,55,130,36,36][i]}},h)
                )
              )),
              E('tbody',null,
                ...fLogs.slice(0,60).map((l,i)=>{
                  const wf=WORKFLOWS[l.wf];
                  return E('tr',{key:l.id,style:{background:i%2===0?"#F9FAFB":"#fff"}},
                    E('td',{style:{padding:"8px 10px",borderBottom:"0.5px solid #EEF0F5",color:"#8A94A6",fontSize:11}},l.date),
                    E('td',{style:{padding:"8px 10px",borderBottom:"0.5px solid #EEF0F5"}},
                      E('div',{style:{display:"flex",alignItems:"center",gap:5}},E(Av,{name:l.name,people}),E('span',{style:{fontSize:11,fontWeight:500}},l.name))
                    ),
                    E('td',{style:{padding:"8px 10px",borderBottom:"0.5px solid #EEF0F5",fontWeight:500,fontSize:11}},l.projectName),
                    E('td',{style:{padding:"8px 10px",borderBottom:"0.5px solid #EEF0F5"}},
                      wf?E('span',{style:{background:wf.light,color:wf.color,padding:"2px 7px",borderRadius:10,fontSize:10,fontWeight:600}},l.wf.length>14?l.wf.slice(0,14)+"…":l.wf):l.wf
                    ),
                    E('td',{style:{padding:"8px 10px",borderBottom:"0.5px solid #EEF0F5",color:"#5F5E5A",fontSize:11}},l.stage),
                    E('td',{style:{padding:"8px 10px",borderBottom:"0.5px solid #EEF0F5",textAlign:"center"}},E(GradePill,{grade:l.grade})),
                    E('td',{style:{padding:"8px 10px",borderBottom:"0.5px solid #EEF0F5",color:"#8A94A6",fontSize:11,maxWidth:130,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},l.notes||"—"),
                    E('td',{style:{padding:"8px 6px",borderBottom:"0.5px solid #EEF0F5",textAlign:"center"}},
                      E('button',{onClick:()=>{setEditLog(l);setShowLog(true);},style:{width:26,height:26,borderRadius:4,border:"0.5px solid #B5D4F4",background:"#E6F1FB",color:"#185FA5",fontSize:12,cursor:"pointer",fontWeight:600}},"✎")
                    ),
                    E('td',{style:{padding:"8px 6px",borderBottom:"0.5px solid #EEF0F5",textAlign:"center"}},
                      E('button',{onClick:()=>deleteLog(l.id),style:{width:26,height:26,borderRadius:4,border:"0.5px solid #F7C1C1",background:"#FCEBEB",color:"#A32D2D",fontSize:14,cursor:"pointer",fontWeight:600}},"×")
                    )
                  );
                })
              )
            )
          )
      ),

      // ── PROJECTS TAB ─────────────────────────────────────────────────────────
      tab==="projects"&&E(React.Fragment,null,
        projects.length===0
          ?E(Card,null,E('div',{style:{textAlign:"center",padding:32,color:"#8A94A6",fontSize:13}},'No projects yet. Hit "+ New project" to create one.'))
          :projStats.map(p=>{
            const wf=WORKFLOWS[p.wf];
            const sc=statusColor(p.status);
            return E(Card,{key:p.id},
              E('div',{style:{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:12,gap:8,flexWrap:"wrap"}},
                E('div',null,
                  E('div',{style:{fontSize:14,fontWeight:600,color:"#1B2A4A",marginBottom:3}},p.name),
                  E('div',{style:{display:"flex",gap:6,flexWrap:"wrap"}},
                    wf&&E('span',{style:{background:wf.light,color:wf.color,padding:"2px 8px",borderRadius:10,fontSize:11,fontWeight:600}},p.wf),
                    p.owner&&E('span',{style:{fontSize:11,color:"#8A94A6"}},"Lead: "+p.owner)
                  )
                ),
                E('div',{style:{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}},
                  E(Badge,{...sc,label:p.status}),
                  p.startDate&&E('span',{style:{fontSize:11,color:"#8A94A6"}},fromISO(p.startDate)+" → "+fromISO(p.endDate))
                )
              ),
              E(Bar,{value:p.avgGrade,color:wf && wf.color}),
              E('div',{style:{fontSize:11,color:"#8A94A6",marginTop:4,marginBottom:12}},p.doneStages+"/"+p.stages.length+" stages complete"),

              // stage timeline
              E('div',{style:{display:"grid",gap:4}},
                ...p.stageAnalysis.map((s,si)=>{
                  const{bg,fg}=gradeColor(s.grade);
                  const overdue=s.isOverdue;
                  return E('div',{key:si,style:{display:"flex",alignItems:"center",gap:8,padding:"5px 8px",borderRadius:6,background:overdue?"#FFF5F5":si%2===0?"#F9FAFB":"#fff",border:overdue?"0.5px solid #F7C1C1":"0.5px solid #EEF0F5"}},
                    E('div',{style:{width:20,height:20,borderRadius:"50%",background:wf && wf.color||"#1B2A4A",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,flexShrink:0}},si+1),
                    E('div',{style:{flex:1,fontSize:11,color:"#1A1A2E"}},s.stage),
                    s.deadline&&E('span',{style:{fontSize:10,color:overdue?"#A32D2D":"#8A94A6",fontWeight:overdue?600:400,flexShrink:0}},overdue?"⚠ Overdue":"Due: "+fromISO(s.deadline)),
                    E('span',{style:{display:"inline-flex",alignItems:"center",justifyContent:"center",width:22,height:22,borderRadius:"50%",background:bg,color:fg,fontWeight:700,fontSize:11,flexShrink:0}},s.grade)
                  );
                })
              )
            );
          })
      ),

      // ── PEOPLE TAB ───────────────────────────────────────────────────────────
      tab==="people"&&E(React.Fragment,null,
        E('div',{style:{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(260px,1fr))",gap:12,marginBottom:16}},
          ...peopleStats.map(p=>{
            const bwLabel=p.activeCount===0?"Available":p.activeCount<=2?"Healthy":p.activeCount===3?"At Capacity":"Overloaded";
            const bwColor=p.activeCount===0?{bg:"#E6F1FB",fg:"#185FA5"}:p.activeCount<=2?{bg:"#EAF3DE",fg:"#3B6D11"}:p.activeCount===3?{bg:"#FFF3CD",fg:"#856404"}:{bg:"#FCEBEB",fg:"#A32D2D"};
            return E('div',{key:p.name,style:{background:"#fff",borderRadius:12,border:"0.5px solid #E2E5EF",padding:16}},
              E('div',{style:{display:"flex",alignItems:"center",gap:10,marginBottom:12}},
                E(Av,{name:p.name,people}),
                E('div',{style:{flex:1}},
                  E('div',{style:{fontSize:13,fontWeight:600,color:"#1B2A4A"}},p.name),
                  E('div',{style:{fontSize:11,color:"#8A94A6"}},p.activeCount+" active project"+(p.activeCount!==1?"s":""))
                ),
                E(Badge,{...bwColor,label:bwLabel})
              ),
              p.avg!==null&&E(Bar,{value:p.avg}),
              E('div',{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginTop:10}},
                ...[["Logs",p.total,"#E6F1FB","#0C447C"],["In prog.",p.inProg,"#FAEEDA","#854F0B"],["Done",p.done,"#EAF3DE","#27500A"]].map(([l,v,bg,fg])=>
                  E('div',{key:l,style:{background:bg,borderRadius:7,padding:"7px 8px",textAlign:"center"}},
                    E('div',{style:{fontSize:10,color:fg,fontWeight:500}},l),
                    E('div',{style:{fontSize:16,fontWeight:700,color:fg}},v)
                  )
                )
              ),
              // work type breakdown
              Object.keys(p.byWF).length>0&&E('div',{style:{marginTop:10}},
                E('div',{style:{fontSize:10,fontWeight:600,color:"#8A94A6",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:6}},"Work type breakdown"),
                ...Object.entries(p.byWF).map(([w,d])=>{
                  const wf=WORKFLOWS[w];
                  return E('div',{key:w,style:{display:"flex",alignItems:"center",gap:6,marginBottom:4}},
                    E('div',{style:{width:8,height:8,borderRadius:"50%",background:wf && wf.color||"#ccc",flexShrink:0}}),
                    E('span',{style:{fontSize:11,color:"#5F5E5A",flex:1}},w.length>20?w.slice(0,20)+"…":w),
                    E('span',{style:{fontSize:11,fontWeight:600,color:wf && wf.color||"#333"}},d.avg.toFixed(1))
                  );
                })
              )
            );
          })
        ),
        // AI Analysis section
        E(Card,null,
          E('div',{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}},
            E('div',null,
              E('div',{style:{fontSize:13,fontWeight:600,color:"#1B2A4A"}},"AI Bandwidth & Productivity Analysis"),
              E('div',{style:{fontSize:11,color:"#8A94A6",marginTop:2}},"Analyses patterns, flags overload, estimates future bandwidth")
            ),
            E('button',{onClick:runAnalysis,disabled:analysing,style:{height:36,padding:"0 16px",borderRadius:8,border:"none",background:analysing?"#D3D1C7":"#1B2A4A",color:"#fff",fontSize:12,fontWeight:600,cursor:analysing?"not-allowed":"pointer",flexShrink:0}},analysing?"Analysing…":"Analyse team")
          ),
          analysisTxt
            ?E('div',{style:{fontSize:13,color:"#1A1A2E",lineHeight:1.7,background:"#F9FAFB",borderRadius:8,padding:"14px 16px",whiteSpace:"pre-wrap"}},analysisTxt)
            :E('div',{style:{fontSize:12,color:"#B4B2A9",fontStyle:"italic",textAlign:"center",padding:"16px 0"}},'Click "Analyse team" to generate an AI-written summary')
        )
      ),

      // ── SETTINGS TAB ─────────────────────────────────────────────────────────
      tab==="settings"&&E('div',{style:{display:"grid",gap:14}},
        E(Card,null,
          E('div',{style:{fontSize:14,fontWeight:600,color:"#1B2A4A",marginBottom:4}},"Team members"),
          E('div',{style:{fontSize:12,color:"#8A94A6",marginBottom:12}},"Add or remove people. Changes apply immediately."),
          E('div',{style:{display:"flex",flexWrap:"wrap",gap:6,marginBottom:12}},
            ...people.map(p=>E('div',{key:p,style:{display:"flex",alignItems:"center",gap:4,background:"#E6F1FB",color:"#0C447C",borderRadius:6,padding:"4px 10px",fontSize:12,fontWeight:500}},
              p,
              E('button',{onClick:()=>removePerson(p),style:{background:"none",border:"none",cursor:"pointer",color:"#0C447C",fontSize:15,lineHeight:1,padding:"0 0 0 4px",opacity:0.5}},"×")
            ))
          ),
          E('div',{style:{display:"flex",gap:8}},
            E('input',{value:newPerson,onChange:e=>setNewPerson(e.target.value),onKeyDown:e=>e.key==="Enter"&&addPerson(),placeholder:"Name + Enter to add",style:{flex:1,height:36,borderRadius:8,border:"1px solid #E2E5EF",padding:"0 12px",fontSize:13,background:"#F5F6FA",outline:"none",color:"#1A1A2E"}}),
            E('button',{onClick:addPerson,style:{height:36,padding:"0 14px",borderRadius:8,border:"none",background:"#1B2A4A",color:"#fff",fontSize:13,fontWeight:600,cursor:"pointer"}},"Add")
          )
        ),
        E(Card,null,
          E('div',{style:{fontSize:14,fontWeight:600,color:"#1B2A4A",marginBottom:4}},"Workflow types"),
          E('div',{style:{fontSize:12,color:"#8A94A6",marginBottom:12}},"All 10 workflow types are built in with their stages."),
          E('div',{style:{display:"grid",gap:8}},
            ...WF_NAMES.map(w=>{
              const wf=WORKFLOWS[w];
              return E('div',{key:w,style:{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",background:wf.light,borderRadius:8,border:"0.5px solid "+wf.color+"33"}},
                E('div',{style:{width:10,height:10,borderRadius:"50%",background:wf.color,flexShrink:0}}),
                E('div',null,
                  E('div',{style:{fontSize:12,fontWeight:600,color:wf.color}},w),
                  E('div',{style:{fontSize:11,color:"#8A94A6"}},wf.stages.length+" stages")
                )
              );
            })
          )
        )
      )
    ),

    showNewProj&&E(NewProjectModal,{people,onSave:addProject,onClose:()=>setShowNewProj(false)}),
    showLog&&E(LogModal,{people,projects,editEntry:editLog,onSave:addLog,onClose:()=>{setShowLog(false);setEditLog(null);}})
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(E(App,null));
</script>
</body>
</html>
